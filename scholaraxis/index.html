
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>ScholarAxis - Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            green: '#006837',
                            orange: '#f7941d',
                            lightGreen: '#00a859'
                        },
                        dark: {
                            bg: '#0f172a',
                            surface: '#1e293b',
                            border: '#334155'
                        }
                    },
                    animation: {
                        'slow-pulse': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'reveal': 'reveal 1.5s cubic-bezier(0.77, 0, 0.175, 1) forwards',
                        'progress': 'progress 2s ease-in-out infinite',
                        'fade-in': 'fadeIn 0.4s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        reveal: {
                            '0%': { clipPath: 'inset(100% 0 0 0)', transform: 'translateY(20px)', opacity: '0' },
                            '100%': { clipPath: 'inset(0 0 0 0)', transform: 'translateY(0)', opacity: '1' },
                        },
                        progress: {
                            '0%': { width: '0%', left: '0%' },
                            '50%': { width: '70%', left: '15%' },
                            '100%': { width: '0%', left: '100%' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --safe-area-inset-top: env(safe-area-inset-top, 0px);
            --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
            --safe-area-inset-left: env(safe-area-inset-left, 0px);
            --safe-area-inset-right: env(safe-area-inset-right, 0px);
            --app-safe-top: var(--safe-area-inset-top);
            --app-safe-bottom: var(--safe-area-inset-bottom);
            --app-safe-left: var(--safe-area-inset-left);
            --app-safe-right: var(--safe-area-inset-right);
        }
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        #root {
            min-height: 100vh;
            min-height: 100dvh;
            padding-left: var(--app-safe-left);
            padding-right: var(--app-safe-right);
            padding-bottom: var(--app-safe-bottom);
            box-sizing: border-box;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
        }
        
        .pt-safe {
            padding-top: var(--app-safe-top);
        }
        .pb-safe {
            padding-bottom: var(--app-safe-bottom);
        }
        .pl-safe {
            padding-left: var(--app-safe-left);
        }
        .pr-safe {
            padding-right: var(--app-safe-right);
        }
        .top-safe {
            top: var(--app-safe-top);
        }
        
        .gradient-mesh {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 104, 55, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(247, 148, 29, 0.05) 0px, transparent 50%);
        }
        .dark .gradient-mesh {
            background-color: #020617;
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 104, 55, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(247, 148, 29, 0.1) 0px, transparent 50%);
        }

        /* STRICT PRINT STYLES FOR PDF GENERATION */
        @media print {
            @page { margin: 0; size: auto; }
            
            body {
                background: white !important;
                visibility: hidden; 
            }

            #root {
                visibility: hidden;
            }

            #bonafide-content {
                visibility: visible !important;
                position: fixed !important;
                left: 0 !important;
                top: 0 !important;
                width: 100% !important;
                height: 100% !important;
                margin: 0 !important;
                padding: 20mm !important; 
                background: white !important;
                z-index: 99999 !important;
                transform: none !important; 
                overflow: visible !important;
                box-shadow: none !important;
                border: none !important;
                display: block !important;
            }

            #bonafide-content * {
                visibility: visible !important;
            }

            .print-hidden {
                display: none !important;
            }
        }
    </style>
    <script>
        // Try to disable status bar overlay in native wrappers (Capacitor/Cordova)
        (function(){
            try{
                // Capacitor (modern)
                if(window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.StatusBar){
                    const StatusBar = window.Capacitor.Plugins.StatusBar;
                    if(StatusBar.setOverlaysWebView){
                        StatusBar.setOverlaysWebView({ overlay: false }).catch(()=>{});
                    }
                }
                // Cordova / old StatusBar plugin
                if(window.StatusBar && typeof window.StatusBar.overlaysWebView === 'function'){
                    try{ window.StatusBar.overlaysWebView(false); }catch(e){}
                }
            }catch(e){}
        })();
    </script>
